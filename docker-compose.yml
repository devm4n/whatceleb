services:
  backend:
    depends_on:
      db:
        condition: service_healthy
        restart: true
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - 8000:8000
  db:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - "5432:5432"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    container_name: frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
volumes:
  postgres:
