services:
  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
    env_file:
      - .env
    ports:
      - 8000:8000

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    container_name: frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
volumes:
  postgres:
